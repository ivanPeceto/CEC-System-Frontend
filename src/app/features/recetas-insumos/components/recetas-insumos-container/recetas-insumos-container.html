<div class="flex flex-col h-full w-full text-zinc-100 gap-6 p-1">
    <header class="w-full relative shrink-0 flex justify-between">
        <div class="flex flex-row gap-1.5">
            <div class="flex flex-row">
              <lucide-icon 
                name="search" 
                class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 w-5 h-5 pointer-events-none">
              </lucide-icon>
              <input type="text"
                (input)="onSearch($event)"
                placeholder="Buscar {{ currentModule() }} por nombre"
                class="pl-12 max-w-md w-full bg-zinc-900/50 border border-zinc-800 rounded-lg py-2 pr-4 text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-300 focus:border-transparent transition-all"
               />
            </div>
            
            <button
            class="flex-1 max-w-sm bg-transparent border border-zinc-700 text-zinc-300 font-semibold p-2.5 rounded-lg hover:bg-zinc-800 transition-colors"
            type="button"
            (click)="onChangeCurrentModule()"
            >
            {{`${currentModule()}`}}
            </button>
        </div>
    </header>
    <div class="flex-1 min-h-0">
    @if (currentModule() === 'insumos') {
        <app-insumos-managment [searchTerm]="searchQuery()"></app-insumos-managment>
    }
    @if (currentModule() === 'recetas') {
        <app-recetas-managment [searchTerm]="searchQuery()"></app-recetas-managment>
    }
    </div>
</div>
