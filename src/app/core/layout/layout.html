<div class="m-[5px] h-[calc(100vh-10px)] flex flex-col bg-zinc-950 text-white font-sans antialiased overflow-hidden">
  
  <main class="flex-grow overflow-y-auto bg-zinc-900/20 rounded-t-xl p-4">
    <router-outlet></router-outlet>
  </main>

  <footer class="h-20 min-h-16 md:h-16 bg-zinc-900/50 border-t border-zinc-800 backdrop-blur-md px-4 flex items-center justify-between">
    
    <div class="hidden md:flex items-center gap-2 w-1/4">
      <lucide-icon [name]="'Store'" class="text-white w-6 h-6"></lucide-icon>
      <span class="font-semibold tracking-tight text-lg">Como en Casa</span>
    </div>

    <nav class="flex items-center justify-around md:justify-center gap-1 md:gap-4 flex-grow md:w-2/4">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="bg-zinc-800 text-white"
           [routerLinkActiveOptions]="{exact: false}"
           class="flex flex-col md:flex-row items-center gap-1 md:gap-2 px-3 py-2 rounded-md transition-all duration-200 hover:bg-zinc-900 group border-none outline-none">
          
          <lucide-icon [name]="item.icon" 
                       class="w-5 h-5 text-zinc-400 group-hover:text-white transition-colors">
          </lucide-icon>
          
          <span class="text-[10px] md:text-sm font-medium text-zinc-400 group-hover:text-zinc-200">
            {{ item.label }}
          </span>
        </a>
      }
    </nav>

    <div class="flex items-center justify-end gap-4 w-1/4">
      <div class="hidden lg:flex flex-col items-end">
        <span class="text-sm font-medium text-white">{{ currentUser.name }}</span>
        <span class="text-xs text-zinc-500">{{ currentUser.role }}</span>
      </div>

      <button (click)="onLogout()" 
              title="Cerrar Sesión"
              class="p-2 rounded-md hover:bg-red-400/10 hover:text-red-400 text-zinc-400 transition-all border-none cursor-pointer">
        <lucide-icon [name]="'LogOut'" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

  </footer>
</div>
